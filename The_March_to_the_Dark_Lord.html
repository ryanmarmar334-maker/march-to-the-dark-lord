<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The March to the Dark Lord</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --field:#191d24; --field2:#12151b; --bone:#f2ecda; --panel-ink:#23211a;
  --line:#3a4250; --bronze:#a8531b; --bronze2:#c9772f; --gold:#d9b15a; --sub:#8a93a1;
  --burn:#d4791f; --bleed:#b23a3a; --frost:#5a9bd4; --poison:#6f9b3e; --sunder:#9a7b3a; --stun:#b9a14a; --freeze:#7fbce0;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:radial-gradient(120% 90% at 50% 0%,#20262f 0%,var(--field) 45%,var(--field2) 100%);
  color:#d7dae0;font-family:"EB Garamond",Georgia,serif;font-size:17px;line-height:1.45;-webkit-text-size-adjust:100%}
h1,h2,h3,.dsp{font-family:"Cinzel",serif;letter-spacing:.04em}
button{font-family:inherit;cursor:pointer}
.wrap{max-width:1060px;margin:0 auto;padding:14px}
.eyebrow{font-family:"Cinzel",serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--bronze2)}
.title{font-size:clamp(30px,7vw,52px);font-weight:700;color:var(--bone);margin:.1em 0;text-shadow:0 2px 0 #000}
.rule{height:2px;background:linear-gradient(90deg,transparent,var(--bronze),transparent);margin:10px 0 18px}
.panel{background:linear-gradient(180deg,#efe9d8,#e4dcc6);color:var(--panel-ink);border:1px solid #b9ad8c;
  border-radius:6px;box-shadow:0 1px 0 #fff inset,0 10px 30px rgba(0,0,0,.45);padding:16px;margin-bottom:14px}
.card{background:#1c212a;border:1px solid var(--line);border-radius:6px;padding:12px;margin-bottom:10px}
.btn{background:linear-gradient(180deg,var(--bronze2),var(--bronze));color:#1c130a;border:1px solid #7a3c12;border-radius:5px;
  padding:10px 16px;font-weight:700;font-family:"Cinzel",serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase;
  box-shadow:0 1px 0 rgba(255,255,255,.25) inset}
.btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
.btn.ghost{background:#222833;color:#d7dae0;border:1px solid var(--line)}
.btn.sm{padding:6px 10px;font-size:11px}
.btn:disabled{opacity:.4;cursor:not-allowed;filter:none}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.spread{justify-content:space-between}
.grid{display:grid;gap:10px}
.tag{display:inline-block;font-family:"Cinzel",serif;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:2px 7px;border-radius:99px;border:1px solid currentColor}
.muted{color:var(--sub)} .small{font-size:13px} .center{text-align:center}
.hp{height:9px;border-radius:6px;background:#0c0f14;border:1px solid #000;overflow:hidden}
.hp>i{display:block;height:100%;background:linear-gradient(90deg,#5a8f3a,#7cc04f)}
.en{height:7px;border-radius:6px;background:#0c0f14;border:1px solid #000;overflow:hidden;margin-top:3px}
.en>i{display:block;height:100%;background:linear-gradient(90deg,#3f74c2,#69a8e6)}
.board{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#0e1117;border:1px solid var(--line);border-radius:8px;padding:10px}
.cell{min-height:64px;border:1px dashed #2a313d;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;transition:background .12s}
.cell.tgt{outline:2px solid var(--bronze2);background:rgba(201,119,47,.12);cursor:pointer}
.cell.movetgt{outline:2px solid var(--frost);background:rgba(90,155,212,.12);cursor:pointer}
.unit{width:100%;height:100%;border-radius:6px;padding:5px 6px;display:flex;flex-direction:column;gap:3px;border:1px solid #000;position:relative;font-size:12px;cursor:pointer}
.unit.hero{background:linear-gradient(180deg,#243245,#1a2433);border-color:#37506e}
.unit.foe{background:linear-gradient(180deg,#3a2230,#281620);border-color:#5e2c3c}
.unit.active{box-shadow:0 0 0 2px var(--gold),0 0 14px rgba(217,177,90,.5)}
.unit.sel{box-shadow:0 0 0 2px var(--bronze2)}
.unit .nm{font-family:"Cinzel",serif;font-size:11px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:3px;flex-wrap:wrap}
.bdg{font-size:9px;font-weight:700;padding:1px 4px;border-radius:4px;color:#0c0f14;font-family:"Cinzel",serif}
.b-burn{background:var(--burn)} .b-bleed{background:var(--bleed)} .b-chill{background:var(--frost)}
.b-poison{background:var(--poison)} .b-sunder{background:var(--sunder)} .b-stun{background:var(--stun)}
.b-freeze{background:var(--freeze)} .b-guard{background:#9fb0c4} .b-armor{background:#c9c2ad} .b-bless{background:var(--gold)}
.log{background:#0c0f14;border:1px solid var(--line);border-radius:6px;padding:10px;height:150px;overflow:auto;font-size:13px}
.log p{margin:0 0 4px}
.actbar{display:flex;gap:8px;flex-wrap:wrap}
.pill{background:#222833;border:1px solid var(--line);border-radius:5px;padding:7px 11px;font-size:13px;cursor:pointer}
.pill:hover{border-color:var(--bronze2)} .pill.on{background:var(--bronze);color:#1c130a;border-color:#7a3c12}
.pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.opt{border:1px solid #b9ad8c;border-radius:6px;padding:10px;cursor:pointer;background:#efe9d8;color:var(--panel-ink)}
.opt:hover{border-color:var(--bronze)} .opt.on{outline:2px solid var(--bronze);background:#f6f1e2}
.map{display:flex;flex-direction:column;gap:6px}
.node{display:flex;gap:12px;align-items:center;border:1px solid var(--line);border-radius:6px;padding:10px 12px;background:#1c212a}
.node.cur{border-color:var(--gold);box-shadow:0 0 12px rgba(217,177,90,.25)} .node.done{opacity:.5}
.node .n{font-family:"Cinzel",serif;color:var(--gold);width:26px;text-align:center}
.loot-it,.shop-it{display:flex;justify-content:space-between;align-items:center;gap:10px;border:1px solid #b9ad8c;border-radius:6px;padding:8px 10px;background:#efe9d8;color:var(--panel-ink);margin-bottom:6px}
.statline{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;text-align:center}
.statline div{background:#171b22;border:1px solid var(--line);border-radius:5px;padding:6px 4px}
.statline b{display:block;font-family:"Cinzel",serif;color:var(--gold);font-size:18px}
.statline span{font-size:10px;letter-spacing:.14em;color:var(--sub)}
.flash{position:fixed;left:50%;top:18px;transform:translateX(-50%);background:#1c212a;border:1px solid var(--bronze);color:var(--bone);padding:8px 16px;border-radius:6px;z-index:50;font-family:"Cinzel",serif;font-size:13px;opacity:0;transition:opacity .25s}
.flash.show{opacity:1}
select,input{font-family:inherit;font-size:15px;padding:7px;border-radius:5px;border:1px solid #b9ad8c;background:#fff;color:#23211a}
@media(max-width:560px){body{font-size:16px}.cell{min-height:56px}}
</style>
</head>
<body>
<div class="flash" id="flash"></div>
<div class="wrap" id="app"></div>
<script>
"use strict";
const Store=(()=>{let mem={};return{
  get(k){try{const v=localStorage.getItem(k);return v==null?null:v;}catch(e){return mem[k]??null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}};})();
const META_KEY="march_meta_v1";
function loadMeta(){try{return JSON.parse(Store.get(META_KEY))||{unlocks:{}};}catch(e){return{unlocks:{}};}}
function saveMeta(m){Store.set(META_KEY,JSON.stringify(m));}
const rnd=n=>Math.floor(Math.random()*n);
const pick=a=>a[rnd(a.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=rnd(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function flash(m){const f=document.getElementById('flash');f.textContent=m;f.classList.add('show');clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove('show'),1400);}
function render(html){document.getElementById('app').innerHTML=html;window.scrollTo(0,0);}
const STATNAMES=["STR","DEX","FOC","VIT","LCK"];
const RACES={
  human:{name:"Human",spread:{STR:15,DEX:15,FOC:15,VIT:15,LCK:15},free:true,desc:"Even on every axis; picks any basic skill."},
  dwarf:{name:"Dwarf",spread:{STR:18,DEX:12,FOC:12,VIT:20,LCK:13},signature:"blacksmithing",desc:"Stout. Starts with Blacksmithing."}
};
const CLASSES={
  Fighter:{add:{STR:5,VIT:5},setSkill:"bash",hint:"STR / VIT — frontline striker"},
  Rogue:{add:{DEX:5,LCK:5},setSkill:"poisoned_throw",hint:"DEX / LCK — thrown poison & bleed"},
  Wizard:{add:{FOC:5,LCK:5},setSkill:"magic_bolt",hint:"FOC / LCK — ranged spells"},
  Cleric:{add:{VIT:5,FOC:5},setSkill:"mend",hint:"VIT / FOC — heals & cleanses"}
};
const RARITIES=["common","uncommon","rare","epic","legendary","artifact"];
const PRICE={common:3,uncommon:6,rare:9,epic:12,legendary:15,artifact:20};
const SLOTS={common:1,uncommon:2,rare:3,epic:4,legendary:5,artifact:6};
const LOOT_TABLE={
 1:[85,13,1,0.7,0.3,0],2:[72,22,4,1.3,0.7,0],3:[60,28,8,2.5,1.5,0],4:[48,32,13,4.5,2.3,0.2],
 5:[38,33,18,7,3.5,0.5],6:[28,32,23,11,5,1],7:[20,28,27,15,8,2],8:[13,23,29,19,13,3],
 9:[8,18,30,24,16,4],10:[5,14,29,27,20,5]};
const WEAPONS={
  dagger:{name:"Dagger",base:3,cost:1,reach:1,kind:"melee",light:true},
  shortsword:{name:"Shortsword",base:5,cost:1,reach:1,kind:"melee",light:true},
  shortbow:{name:"Shortbow",base:4,cost:1,reach:99,kind:"ranged",light:true},
  longsword:{name:"Longsword",base:8,cost:1,reach:1,kind:"melee"},
  hammer:{name:"Hammer",base:9,cost:1,reach:1,kind:"melee"},
  spear:{name:"Spear",base:7,cost:1,reach:2,kind:"melee"},
  bow:{name:"Bow",base:8,cost:1,reach:99,kind:"ranged"},
  claymore:{name:"Claymore",base:16,cost:2,reach:1,kind:"melee",pierce:true,req:{STR:20}},
  battleaxe:{name:"Battle Axe",base:14,cost:2,reach:1,kind:"melee",pierce:true,req:{STR:20}},
  halberd:{name:"Halberd",base:13,cost:2,reach:2,kind:"melee",pierce:true,req:{STR:20}},
  crossbow:{name:"Crossbow",base:12,cost:2,reach:99,kind:"ranged",pierce:true,req:{STR:20}},
  wand:{name:"Wand",base:0,cost:1,reach:99,kind:"focus",focus:"wand"}
};
const BODY={robe:{name:"Robe",soak:1,gate:0},leather:{name:"Leather",soak:3,gate:15},chainmail:{name:"Chainmail",soak:5,gate:20},platemail:{name:"Platemail",soak:8,gate:25},fullplate:{name:"Full Platemail",soak:12,gate:30}};
const HEAD={hat:{name:"Wizard Hat",soak:1,gate:0},headband:{name:"Head Band",soak:1,gate:0},helm:{name:"Helm",soak:3,gate:15},closed:{name:"Closed-face Helm",soak:5,gate:20}};
const FEET={shoes:{name:"Shoes",soak:1,gate:0},boots:{name:"Boots",soak:3,gate:15},armoredboots:{name:"Armored Boots",soak:5,gate:20},sabatons:{name:"Sabatons",soak:8,gate:25}};
const SHIELDS={buckler:{name:"Buckler",soak:2,gate:0},heater:{name:"Heater",soak:4,gate:15},kite:{name:"Kite",soak:6,gate:20},scutum:{name:"Scutum",soak:8,gate:25}};
const GLYPHS={
  flame:{name:"Flame Glyph",on:"weapon",effect:"Burn on hit (scales with rarity)"},
  venom:{name:"Venom Glyph",on:"weapon",effect:"Poison on hit (scales with rarity)"},
  razor:{name:"Razor Glyph",on:"weapon",effect:"Bleed on hit (scales with rarity)"},
  stone:{name:"Stone Glyph",on:"armor",effect:"+soak/round (scales with rarity)"},
  vigor:{name:"Vigor Glyph",on:"armor",effect:"+max HP (scales with rarity)"}
};
function glyphScale(key,rarity){const idx=Math.max(0,RARITIES.indexOf(rarity||"common")),sc=idx+1;
  if(key==="flame")return{kind:"burn",n:sc,txt:`+${sc} Burn on hit`};
  if(key==="razor")return{kind:"bleed",n:sc,txt:`+${sc} Bleed on hit`};
  if(key==="venom")return{kind:"poison",dmg:3+idx*2,rounds:3,txt:`Poison ${3+idx*2}x3 on hit`};
  if(key==="stone")return{kind:"soak",n:2*sc,txt:`+${2*sc} soak/round`};
  if(key==="vigor")return{kind:"hp",n:10*sc,txt:`+${10*sc} max HP`};
  return{kind:"",n:0,txt:""};}
function freshStatus(){return{burn:0,bleed:0,chill:0,poison:null,sunder:null,stun:0,frozen:false,frozenHit:false,guard:null,armorBuff:0,bless:null};}
const SKILLS={
 bash:{name:"Bash",cls:"Fighter",req:["STR",15],cost:1,uses:2,target:"enemy",reach:1,tier:1,
   text:r=>`Weapon +STR/5 +${[0,0,4,4,8,8][r]}, Stun ${[0,1,1,2,2,3][r]}`,
   use:(g,a,t,r)=>{g.weaponHit(a,t);g.dealRaw(a,t,[0,0,4,4,8,8][r],"bash");g.applyStun(t,[0,1,1,2,2,3][r]);t.energy=0;g.log(`<span class="muted">${t.name} is dazed — loses their whole action.</span>`);}},
 sunder_strike:{name:"Sunder Strike",cls:"Fighter",req:["STR",18],cost:1,target:"enemy",reach:1,tier:1,
   text:r=>`Weapon, -${r>=3?5:3} soak ${[0,1,2,3,4,99][r]>9?'(combat)':[0,1,2,3,4,99][r]+'rd'}`,
   use:(g,a,t,r)=>{g.weaponHit(a,t);g.applySunder(t,r>=3?5:3,[0,1,2,3,4,99][r]);}},
 guard:{name:"Guard",cls:"Fighter",req:["VIT",15],cost:1,target:"ally",tier:1,
   text:r=>`Intercept for ${r>=3?2:1} ally, cut VIT/${[0,5,5,4,4,3][r]}`,
   use:(g,a,t,r)=>{a.st.guard={ward:t.id,div:[0,5,5,4,4,3][r]};g.log(a.name+" guards "+t.name+".");}},
 cleave:{name:"Cleave",cls:"Fighter",req:["STR",30],cost:2,target:"enemy",reach:1,tier:2,
   text:r=>`Hit target's rank${r>=3?' + behind':''}, weapon +STR/${[0,5,5,4,3,3][r]}`,
   use:(g,a,t,r)=>{g.cleaveTargets(t,r).forEach(x=>g.weaponHit(a,x,[0,5,5,4,3,3][r]));}},
 shield_wall:{name:"Shield Wall",cls:"Fighter",req:["STR",25],req2:["VIT",25],cost:2,target:"self",tier:2,
   text:r=>`You + adjacent allies +VIT/${[0,5,4,4,3,3][r]} soak`,
   use:(g,a,t,r)=>{[a,...g.adjacentAllies(a)].forEach(x=>{x.st.armorBuff+=Math.floor(g.stat(x,"VIT")/[0,5,4,4,3,3][r]);g.refreshSoak(x);});g.log(a.name+" raises a shield wall.");}},
 poisoned_throw:{name:"Poisoned Throw",cls:"Rogue",req:["DEX",15],cost:1,target:"enemy",thrown:true,minRange:2,tier:1,
   text:r=>`Weapon +DEX/5, Poison ${[0,5,6,7,8,8][r]}x${[0,5,5,5,5,6][r]}`,
   use:(g,a,t,r)=>{g.weaponHit(a,t,5,true);g.applyPoison(t,[0,5,6,7,8,8][r],[0,5,5,5,5,6][r]);}},
 razor_fan:{name:"Razor Fan",cls:"Rogue",req:["DEX",18],cost:1,target:"enemy",thrown:true,tier:1,
   text:r=>`Weapon +DEX/5, +${[0,3,4,5,6,6][r]} Bleed${r>=5?' (+behind)':''}`,
   use:(g,a,t,r)=>{g.weaponHit(a,t,5,true);g.applyBleed(t,[0,3,4,5,6,6][r]);if(r>=5){const b=g.behind(t);if(b)g.applyBleed(b,6);}}},
 exploit:{name:"Exploit",cls:"Rogue",req:["DEX",18],cost:2,target:"enemy",thrown:true,tier:1,
   text:r=>`+${[0,50,65,80,95,110][r]}% vs afflicted${r>=5?', crit':''}`,
   use:(g,a,t,r)=>{const aff=g.afflicted(t);const mult=aff?1+[0,50,65,80,95,110][r]/100:1;g.weaponHit(a,t,5,true,mult,aff&&r>=5);}},
 rupture:{name:"Rupture",cls:"Rogue",req:["DEX",25],cost:2,target:"enemy",thrown:true,tier:2,
   text:r=>`Detonate Bleed x${[0,3,4,4,5,5][r]}${r>=5?', contagion':''}`,
   use:(g,a,t,r)=>{const m=[0,3,4,4,5,5][r];const b=t.st.bleed;if(b<=0){g.log(t.name+" has no Bleed.");g.weaponHit(a,t,5,true);return;}g.dealRaw(a,t,b*m,"rupture");t.st.bleed=0;if(r>=5){const h=Math.floor(b/2);g.adjacentEnemiesOf(a,t).forEach(x=>{if(x.st.bleed>0)g.applyBleed(x,Math.max(1,Math.floor(h/2)));});}}},
 magic_bolt:{name:"Magic Bolt",cls:"Wizard",req:["FOC",15],cost:1,target:"enemy",ranged:true,tier:1,
   text:r=>`${[0,8,11,14,17,20][r]} magic damage`,
   use:(g,a,t,r)=>g.spellHit(a,t,[0,8,11,14,17,20][r])},
 firebolt:{name:"Firebolt",cls:"Wizard",req:["FOC",18],cost:1,target:"enemy",ranged:true,tier:1,
   text:r=>`${[0,6,8,10,12,14][r]} dmg + ${[0,2,2,3,3,4][r]} Burn`,
   use:(g,a,t,r)=>{g.spellHit(a,t,[0,6,8,10,12,14][r]);g.applyBurn(t,[0,2,2,3,3,4][r]);}},
 frost_shard:{name:"Frost Shard",cls:"Wizard",req:["FOC",18],cost:1,target:"enemy",ranged:true,tier:1,
   text:r=>`${[0,5,7,9,11,13][r]} dmg + ${[0,2,2,3,3,4][r]} Chill`,
   use:(g,a,t,r)=>{g.spellHit(a,t,[0,5,7,9,11,13][r]);g.applyChill(t,[0,2,2,3,3,4][r]);}},
 fireball:{name:"Fireball",cls:"Wizard",req:["FOC",28],cost:2,target:"aoe",ranged:true,tier:2,
   text:r=>`AoE ${[0,8,10,12,14,16][r]} dmg + Burn (friend & foe)`,
   use:(g,a,t,r)=>{g.aoeAt(t,a,x=>{g.spellHit(a,x,[0,8,10,12,14,16][r]);g.applyBurn(x,r>=4?2:1);},r>=5?2:1);}},
 combustion:{name:"Combustion",cls:"Wizard",req:["FOC",25],cost:2,target:"enemy",ranged:true,tier:2,
   text:r=>`Detonate Burn x${[0,3,4,4,5,5][r]} (ignores armor)`,
   use:(g,a,t,r)=>{const m=[0,3,4,4,5,5][r];const b=t.st.burn;if(b<=0){g.log(t.name+" isn't burning.");g.spellHit(a,t,6);return;}g.dealRaw(a,t,b*m,"combustion",true);t.st.burn=0;if(r>=3)g.adjacentEnemiesOf(a,t).forEach(x=>g.dealRaw(a,x,b,"combustion",true));}},
 mend:{name:"Mend",cls:"Cleric",req:["FOC",15],cost:1,target:"ally",tier:1,
   text:r=>`Heal ${[0,5,7,9,11,11][r]}xlvl${r>=5?' +adjacent':''}`,
   use:(g,a,t,r)=>{g.heal(a,t,[0,5,7,9,11,11][r]*g.level);if(r>=5){const x=g.adjacentAllies(t)[0];if(x)g.heal(a,x,5*g.level);}}},
 purify:{name:"Purify",cls:"Cleric",req:["FOC",18],cost:1,uses:2,target:"ally",tier:1,
   text:r=>`Cleanse ${[0,2,3,3,4,99][r]>9?'all of one':[0,2,3,3,4,99][r]} stacks`,
   use:(g,a,t,r)=>g.purify(t,[0,2,3,3,4,99][r],r>=5)},
 bless:{name:"Bless",cls:"Cleric",req:["FOC",18],cost:1,target:"ally",tier:1,
   text:r=>`Next ${r>=3?3:2} hits +${[0,20,30,30,40,40][r]}%`,
   use:(g,a,t,r)=>{t.st.bless={pct:[0,20,30,30,40,40][r],hits:r>=3?3:2};g.log(a.name+" blesses "+t.name+".");if(r>=5){const x=g.adjacentAllies(t)[0];if(x)x.st.bless={pct:40,hits:3};}}},
 benediction:{name:"Benediction",cls:"Cleric",req:["FOC",25],cost:2,target:"self",tier:2,
   text:r=>`Party next hit +${[0,15,20,25,30,30][r]}%${r>=5?', heal':''}`,
   use:(g,a,t,r)=>{g.heroesAlive().forEach(x=>x.st.bless={pct:[0,15,20,25,30,30][r],hits:1});if(r>=5)g.heroesAlive().forEach(x=>g.heal(a,x,5*g.level));g.log(a.name+" calls a benediction.");}}
};
const BASIC_SKILLS=Object.keys(SKILLS).filter(k=>SKILLS[k].tier===1);
const PROFESSIONS={
 alchemy:{name:"Alchemy",req:["FOC",20],desc:"Craft poison bottles & molotovs in shops."},
 trader:{name:"Trader",req:["LCK",15],desc:"Sell loot at 30%→50% as it ranks."},

const TUTORIAL=[
 {t:"Your Company",h:`<p><b>You forge exactly four heroes</b> — one of each class is the intended composition. Each class owns one half of the setup-and-payoff loop; the party has to combine them.</p>
   <div class="grid" style="margin-top:10px">
   <div class="card"><b style="color:var(--gold)">Fighter</b> <span class="muted small">STR / VIT</span><div class="small">Frontline. Absorbs hits, stuns foes, guards allies, and sunders armour so the rest of the party can land big damage.</div></div>
   <div class="card"><b style="color:var(--gold)">Rogue</b> <span class="muted small">DEX / LCK</span><div class="small">Ranged setup. Applies Poison and Bleed from a distance, then detonates Bleed with Rupture for burst damage.</div></div>
   <div class="card"><b style="color:var(--gold)">Wizard</b> <span class="muted small">FOC / LCK</span><div class="small">Ranged spells. Applies Burn and Chill, then detonates Burn with Combustion — ignoring armour entirely.</div></div>
   <div class="card"><b style="color:var(--gold)">Cleric</b> <span class="muted small">VIT / FOC</span><div class="small">Support. Heals wounded allies, wipes Poison with Purify, and blesses the party for bonus damage on the next strike.</div></div></div>
   <p style="margin-top:10px"><b>Stats in brief:</b> STR = melee damage · DEX = ranged damage + energy · FOC = spell power + Memory slots · VIT = HP + poison resistance · LCK = crit chance + loot rarity.</p>
   <p style="margin-top:6px"><b>Memory slots</b> = FOC ÷ 5. This is the hard cap on how many skills a hero can know at once. A starting Wizard has 4 FOC → 4 slots. Raise FOC to unlock more.</p>`},
 {t:"The Board & Combat Flow",h:`<p>Combat takes place on a <b>2-column × 6-row corridor</b>. Your heroes spawn in the bottom two rows; foes start in the top two rows. They march toward each other each round.</p>
   <p style="margin-top:8px"><b>How a round works:</b> It's your team phase — act with all living heroes in any order you like, then press <b>End Turn</b>. The foes then take their turns and the next round begins.</p>
   <p style="margin-top:8px"><b>How to act:</b> Click a hero to select them (highlighted gold border). Click an action pill at the bottom — Move, Attack, a skill, or an item. Valid targets highlight on the board. Click a highlighted tile or unit to execute. Click the same pill again to cancel.</p>
   <p style="margin-top:8px"><b>Reach:</b> Most melee weapons only reach adjacent tiles (distance 1). Spears and Halberds reach distance 2. Bows and all spells reach the entire board — range is never an obstacle for a Wizard or Rogue.</p>`},
 {t:"Energy & Actions",h:`<p>Each hero has an <b>Energy</b> budget per round (the blue bar below their HP). Energy = max(2, DEX ÷ 5) — a hero with DEX 20 gets 4 energy per round.</p>
   <div class="grid" style="margin-top:10px">
   <div class="card"><b>Move</b> <span class="muted small">1e per tile</span><div class="small">Step to any adjacent empty tile. Moving while Bleeding triggers Bleed damage — watch your footing.</div></div>
   <div class="card"><b>Attack</b> <span class="muted small">0–2e</span><div class="small">Light weapons (Dagger, Shortbow…) cost <b>0e for the first swing each round</b>, then their listed cost. Medium weapons cost 1e. Heavy weapons cost 2e.</div></div>
   <div class="card"><b>Raise Shield</b> <span class="muted small">1e</span><div class="small">Adds the shield's soak to your total for this round only. Use before taking a big hit.</div></div>
   <div class="card"><b>Skills & Items</b> <span class="muted small">listed cost</span><div class="small">Skills cost their listed energy. Some have limited uses per fight (shown as · N in the pill). Items cost 1e to use.</div></div></div>
   <p style="margin-top:10px">A hero with 0 energy can't act — select another hero or press <b>End Turn</b>. On <b>Easy</b>, the <b>Undo Round</b> button resets the whole round back to the start of your phase.</p>`},
 {t:"Armour, Weapons & Damage",h:`<p><b>Soak</b> (the 🛡 number on each unit) refreshes at the start of every round and absorbs incoming damage before it touches HP. A foe with 12 soak ignores the first 12 damage of each hit. Burst them with multiple attacks in one round to strip soak fast.</p>
   <p style="margin-top:8px"><b>Weapon tiers:</b></p>
   <div class="grid" style="margin-top:6px">
   <div class="card"><b>Light</b> <span class="muted small">Dagger · Shortsword · Shortbow</span><div class="small">First swing each round costs 0 energy. Good for heroes who want to act twice cheaply.</div></div>
   <div class="card"><b>Medium</b> <span class="muted small">Longsword · Hammer · Spear · Bow</span><div class="small">1 energy per attack. Solid base damage with no gates.</div></div>
   <div class="card"><b>Heavy · Pierce</b> <span class="muted small">Claymore · Battle Axe · Halberd · Crossbow</span><div class="small">2e, require <b>STR 20</b>. Their <b>base damage bypasses soak entirely</b> — only the stat-scaling portion is soaked. Ideal against plated enemies.</div></div></div>

 {t:"The Six Statuses",h:`<p class="muted small" style="margin-bottom:10px">The whole game is <b>set a status, then cash it in.</b> Each class applies different ones — combine them across your party for the payoff.</p>
   <div class="grid">
   <div class="card"><b style="color:var(--burn)">🔥 Burn</b><div class="small">Fire damage at the start of the victim's turn, then fades by 1. Detonate the whole stack with <i>Combustion</i> (ignores armour).</div></div>
   <div class="card"><b style="color:var(--bleed)">🩸 Bleed</b><div class="small">Triggers at the start of the victim's turn <b>and whenever it moves</b> — not on attacking. Fades by 1 each turn. Detonate with <i>Rupture</i>.</div></div>
   <div class="card"><b style="color:var(--poison)">☠ Poison</b><div class="small">Fixed damage per round for a set number of rounds, reduced by VIT÷5. Re-applying restarts the timer. <i>Purify</i> wipes it entirely.</div></div>
   <div class="card"><b style="color:var(--frost)">❄ Chill / Freeze</b><div class="small">Chill lowers available energy by its amount each round, then fades by 1. If Chill ≥ max energy the unit <b>Freezes</b> — loses the whole round, then all Chill is gone.</div></div>
   <div class="card"><b style="color:var(--sunder)">🪓 Sunder</b><div class="small">Cuts armour soak by a set amount for a few rounds. Pure setup — land it, then hit hard while the armour is stripped.</div></div>
   <div class="card"><b style="color:var(--stun)">💫 Stun / Daze</b><div class="small">The target loses their whole next action. <i>Bash</i> also zeroes the target's current energy, stripping their turn outright.</div></div></div>`},
 {t:"Gear, Glyphs & Professions",h:`<p>Each hero wears <b>five slots</b>: head, body, feet, hand1, hand2. The hand slots hold a weapon plus optionally a shield, a second weapon, or a caster focus. Heavier armour needs higher VIT; heavy weapons need STR 20.</p>
   <p style="margin-top:8px"><b>Glyphs</b> are enchantments socketed into gear. Weapon glyphs (Flame, Razor, Venom) trigger on every hit; armour glyphs (Stone, Vigor) add soak or max HP. Rarer gear has more socket slots (1 at common → 6 at artifact). <b>A glyph's strength scales with its own rarity</b> — an artifact Flame Glyph applies 6 Burn per hit vs. 1 for a common. Socketing costs 5 gold at a shop, or is free if a party member has the Blacksmithing profession.</p>
   <p style="margin-top:8px"><b>Professions</b> unlock when a hero meets the stat requirement:</p>
   <div class="grid" style="margin-top:6px">
   <div class="card"><b>Alchemy</b> <span class="muted small">FOC 20</span><div class="small">Seeds poison bottles and molotovs into every shop stock.</div></div>
   <div class="card"><b>Trader</b> <span class="muted small">LCK 15</span><div class="small">Improves sell prices from 25% up to 50% at rank 5.</div></div>
   <div class="card"><b>Blacksmithing</b> <span class="muted small">STR 20</span><div class="small">Socket glyphs for free. In combat, spend 1e to plate an ally for +5 soak that round (2 uses per fight).</div></div></div>`},
 {t:"Between Fights",h:`<p>Understanding the flow between fights is as important as the fighting itself.</p>
   <p style="margin-top:8px"><b>After every skirmish:</b> Pick 3 of 5 loot items, then the boss intro screen appears. LCK bumps loot rarity — keep it high on at least one hero.</p>
   <p style="margin-top:8px"><b>After every boss:</b> All living heroes <b>level up</b> (+2 stat points, +1 skill point each). Then: loot → Manage screen → Shop → back to the map.</p>
   <div class="grid" style="margin-top:8px">
   <div class="card"><b>Manage Screen</b><div class="small">Spend <b>stat points</b> to raise STR/DEX/FOC/VIT/LCK — this unlocks new skills, gear gates, and profession access. Spend <b>skill points</b> to learn a new skill (1 point; capped by Memory slots) or rank an existing one R1→R5 for stronger effects.</div></div>
   <div class="card"><b>Shop</b><div class="small">Buy gear and consumables with gold. Prices: 3g (common) → 20g (artifact). You start with 30 gold. Sell unwanted items from your stash for 25–50% back depending on Trader rank.</div></div></div>
   <p style="margin-top:10px">On <b>Hard</b>, each skill point costs 5 stat points instead of being a separate resource. Plan your stat growth carefully.</p>`},
 {t:"The March",h:`<p>Nine of ten themed areas appear in random order each run. <b>The Dark Lord is always last.</b> Each area is one skirmish followed by one boss. The map shows a hint for each boss — read it before you enter and prepare accordingly.</p>
   <p style="margin-top:8px">Every boss tests a specific strategy: one demands Pierce or spells to crack armour, another keeps regenerating until you apply Burn, another floods the board with adds at half HP. The hint tells you what's coming.</p>
   <p style="margin-top:8px"><b>Difficulty:</b></p>
   <div class="grid" style="margin-top:6px">

   <div class="card"><b>Hard</b><div class="small">Permadeath — the dead stay dead. Skill points cost 5 stat points each. No safety net.</div></div></div>

    const ph=n.fightPhase||0,phLabel=PHASE_LABELS[ph],btnLabel=PHASE_BTNS[ph];
    const sub=cur?`<span class="tag" style="color:var(--bronze2);border-color:var(--bronze2);margin-right:6px">${phLabel}</span>${chk}`:chk;
    h+=`<div class="node ${cur?'cur':''} ${n.done?'done':''}"><div class="n">${n.darklord?'☠':n.level}</div><div style="flex:1"><b class="dsp" style="color:#fff;font-size:15px">${name}</b><div class="muted small">${sub}</div></div>${cur?`<button class="btn sm" onclick="enterNode()">${btnLabel}</button>`:n.done?'<span class="muted small">cleared</span>':'<span class="muted small">—</span>'}</div>`;});
  h+=`</div><div class="row" style="margin-top:12px"><button class="btn ghost sm" onclick="manageScreen(screenMap,false)">Inspect Company</button></div></div>`;render(h);}
function screenVictory(){G.meta.wins=(G.meta.wins||0)+1;saveMeta(G.meta);
  render(`<div class="center" style="padding-top:40px"><div class="eyebrow">The formation breaks</div><h1 class="title">The Dark Lord Falls</h1><div class="rule"></div>
    <p class="muted" style="max-width:520px;margin:0 auto 20px">Your company stands amid the wreckage of the tenth gate. The march is ended; the realm exhales.</p>
    <button class="btn" onclick="screenTitle()">New March</button></div>`);}
function screenDefeat(perma){render(`<div class="center" style="padding-top:40px"><div class="eyebrow">${perma?'Permadeath':'The line breaks'}</div><h1 class="title">Your Company Falls</h1><div class="rule"></div>
    <p class="muted" style="max-width:520px;margin:0 auto 20px">${perma?'On Hard, the dead stay dead. This march is over.':'Wiped at area '+currentNode().level+'.'}</p>
    <div class="row" style="justify-content:center">${!perma?'<button class="btn" onclick="retryNode()">Try this area again</button>':''}<button class="btn ghost" onclick="screenTitle()">Title</button></div></div>`);}
function retryNode(){G.party.forEach(h=>{h.alive=true;h.hp=h.maxhp;h.st=freshStatus();});enterNode();}
screenTitle();
</script>
</body>
</html>
